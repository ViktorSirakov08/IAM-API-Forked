# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/iam_system
spring.datasource.username=postgres
# REPLACE 'your_password' with the one you set in Step 1C
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# Automatically creates tables based on your Java classes (Great for dev, turn off for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.springframework.security=DEBUG